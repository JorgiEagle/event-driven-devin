services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - task_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - EDD_CONFIG_PATH=/app/config.json
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: ["http", "http://app:8000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - app
    restart: "no"
    profiles:
      - tunnel

volumes:
  task_data:
